name: Copy from joycon-color

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/copy-from-joycon.yml'

permissions:
  contents: write

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          path: target

      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: cuijunhao20000307-web/joycon-color
          path: source

      - name: Copy project files
        run: |
          rm -rf source/.git
          rm -rf source/.github/workflows
          shopt -s dotglob
          cd target
          find . -mindepth 1 \
            ! -path './.git*' \
            ! -path './.github' \
            ! -path './.github/*' \
            -exec rm -rf {} + || true
          cp -a ../source/. .
          mkdir -p .github/workflows

      - name: Rename project to NX Nexus
        run: |
          cd target
          find . -type f \( -name 'Makefile' -o -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.md' -o -name '*.json' \) -print0 | \
          xargs -0 sed -i 's/JOY-CON Color/NX Nexus/g; s/Joy-Con Color/NX Nexus/g; s/joycon-color/NX-Nexus/g; s/JOY-CON/NX-Nexus/g' || true

      - name: Restore copy workflow
        run: |
          cd target
          mkdir -p .github/workflows
          cat > .github/workflows/copy-from-joycon.yml <<'YAML'
          name: Copy from joycon-color

          on:
            workflow_dispatch:

          permissions:
            contents: write

          jobs:
            copy:
              runs-on: ubuntu-latest
              steps:
                - name: Info
                  run: echo "NX Nexus copied from joycon-color."
          YAML
          sed -i 's/^          //' .github/workflows/copy-from-joycon.yml

      - name: Commit copied project
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Copy joycon-color base into NX Nexus" || echo "No changes to commit"
          git push origin HEAD:${GITHUB_REF_NAME}

# trigger excluding workflow files
